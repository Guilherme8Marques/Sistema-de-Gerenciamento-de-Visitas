# CI/CD Pipeline - Deploy to GCP
name: Deploy to GCP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

      - name: Copy Files to Server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          source: "dist,server,package.json,package-lock.json,docker-compose.yml,Dockerfile,nginx.conf"
          target: "~/Sistema-de-Gerenciamento-de-Visitas"
          strip_components: 0
          overwrite: true

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            cd ~/Sistema-de-Gerenciamento-de-Visitas
            docker compose down
            docker compose up -d --build
            sleep 10
            echo "--- STATUS ---"
            docker compose ps
            echo "--- APP LOGS ---"
            docker compose logs app --tail 30
            docker image prune -f
