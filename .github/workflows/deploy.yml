name: Deploy to GCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          command_timeout: 30m
          script: |
            # Garante que estamos na home e limpa se não for git
            if [ -d "Sistema-de-Gerenciamento-de-Visitas" ] && [ ! -d "Sistema-de-Gerenciamento-de-Visitas/.git" ]; then
              rm -rf Sistema-de-Gerenciamento-de-Visitas
            fi
            
            if [ ! -d "Sistema-de-Gerenciamento-de-Visitas" ]; then
              git clone https://github.com/Guilherme8Marques/Sistema-de-Gerenciamento-de-Visitas.git
            fi
            
            cd Sistema-de-Gerenciamento-de-Visitas
            git pull origin main
            
            # Tenta rodar sem sudo primeiro (assumindo que o user está no grupo docker)
            # Se falhar, tenta com sudo -n (não interativo)
            docker compose up -d --build || sudo -n docker compose up -d --build
            
            # Limpeza
            docker image prune -f || sudo -n docker image prune -f
