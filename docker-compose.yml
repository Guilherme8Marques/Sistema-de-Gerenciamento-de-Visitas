services:
  app:
    build: .
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=5000
    volumes:
      # Montar a pasta server inteira para evitar erros de criação de diretório (EISDIR)
      - ./server:/app/server
      - ./dados:/app/dados
      # Volume anônimo para manter node_modules do container intactos
      - /app/node_modules
    # Porta 5000 não exposta externamente (segurança)

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: always
