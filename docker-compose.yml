services:
  app:
    build: .
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=5000
    volumes:
      # Bind mounts para persistência no Host da Oracle
      - ./server/database.db:/app/server/database.db
      - ./server/db_audit.log:/app/server/db_audit.log
      - ./server/database.pid:/app/server/database.pid
      - ./dados:/app/dados
    # Porta 5000 não exposta externamente (segurança)

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: always
